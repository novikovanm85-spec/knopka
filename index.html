<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Брейн-Ринг | Таймер + Фальстарт</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui; background: #0a0c15; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .host-screen { max-width: 1300px; width: 100%; background: linear-gradient(145deg, #0f121c, #07090f); border-radius: 64px; padding: 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.08); }
        
        /* Таймер */
        .timer-panel { background: #00000030; border-radius: 60px; padding: 20px 30px; margin-bottom: 30px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .timer-display { font-size: 4rem; font-weight: 800; font-family: monospace; letter-spacing: 5px; background: #00000050; padding: 10px 30px; border-radius: 50px; color: #0f0; text-shadow: 0 0 10px #0f0; }
        .timer-controls { display: flex; gap: 15px; }
        .timer-btn { background: #2a2e45; border: none; color: white; font-size: 1.2rem; font-weight: bold; padding: 12px 28px; border-radius: 40px; cursor: pointer; transition: 0.1s; font-family: inherit; }
        .timer-btn:active { transform: scale(0.96); }
        .timer-btn.start { background: #2e7d32; }
        .timer-btn.start:hover { background: #1b5e20; }
        .timer-btn.reset { background: #b71c1c; }
        
        /* Арена */
        .arena { display: flex; flex-wrap: wrap; gap: 30px; margin: 30px 0; }
        .team-card { flex: 1; min-width: 260px; background: rgba(20,22,36,0.7); border-radius: 48px; padding: 40px 24px; text-align: center; border: 2px solid rgba(255,255,255,0.1); transition: all 0.2s; position: relative; }
        .team-a.active { background: linear-gradient(145deg, #8b0000, #4a0000); border-color: #ff4444; box-shadow: 0 0 35px rgba(255,68,68,0.6); }
        .team-b.active { background: linear-gradient(145deg, #003c8b, #001a4a); border-color: #4488ff; box-shadow: 0 0 35px rgba(68,136,255,0.6); }
        .team-name { font-size: 2.5rem; font-weight: 800; }
        .team-a .team-name { color: #ff8888; text-shadow: 0 0 10px #ff0000; }
        .team-b .team-name { color: #88aaff; text-shadow: 0 0 10px #2266ff; }
        .foul-badge { position: absolute; top: 20px; right: 20px; background: #ff0000; color: white; font-weight: bold; padding: 8px 16px; border-radius: 30px; font-size: 0.9rem; }
        .buzzer-status { margin-top: 20px; color: #aaa; }
        .winner-glow { font-size: 1.4rem; font-weight: bold; margin-top: 15px; }
        .reset-btn { background: #2a2e45; border: none; color: white; font-size: 1.4rem; font-weight: bold; padding: 16px 40px; border-radius: 60px; width: 100%; cursor: pointer; margin-top: 20px; font-family: inherit; }
        .reset-btn:active { transform: scale(0.97); background: #1e2132; }
        
        /* QR */
        .qr-panel { display: flex; flex-wrap: wrap; gap: 30px; margin-top: 30px; padding-top: 30px; border-top: 2px dashed rgba(255,255,255,0.15); justify-content: center; }
        .qr-item { background: #ffffff10; border-radius: 32px; padding: 20px; text-align: center; flex: 1; }
        .qr-item canvas { background: white; padding: 12px; border-radius: 28px; width: 180px; height: 180px; margin: 10px auto; }
        .qr-link { font-size: 12px; word-break: break-all; color: #aaa; margin-top: 10px; }
        .status-led { display: inline-block; width: 14px; height: 14px; border-radius: 14px; background: #2ecc71; box-shadow: 0 0 6px #2ecc71; margin-right: 10px; }
        @media (max-width: 750px) { .host-screen { padding: 20px; } .team-name { font-size: 1.8rem; } .team-card { padding: 24px 16px; } .qr-item canvas { width: 130px; height: 130px; } .timer-display { font-size: 2.5rem; } }
    </style>
</head>
<body>
<div class="host-screen">
    <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 20px;">
        <h1 style="font-size: 2rem;">🎤 Брейн-Ринг</h1>
        <div><span class="status-led"></span> Онлайн | Кто нажмёт первым?</div>
    </div>
    
    <!-- Таймер панель -->
    <div class="timer-panel">
        <div class="timer-display" id="timerDisplay">01:00</div>
        <div class="timer-controls">
            <button class="timer-btn start" id="startTimerBtn">▶ СТАРТ</button>
            <button class="timer-btn reset" id="resetTimerBtn">🔄 СБРОС</button>
        </div>
    </div>
    
    <div class="arena">
        <div class="team-card team-a" id="teamACard">
            <div class="team-name">🔴 КОМАНДА A</div>
            <div class="buzzer-status" id="teamAStatus">⏳ Ожидание нажатия</div>
            <div class="winner-glow" id="teamAGlow"></div>
            <div class="foul-badge" id="teamAFoul" style="display: none;">⚠️ ФАЛЬСТАРТ</div>
        </div>
        <div class="team-card team-b" id="teamBCard">
            <div class="team-name">🔵 КОМАНДА B</div>
            <div class="buzzer-status" id="teamBStatus">⏳ Ожидание нажатия</div>
            <div class="winner-glow" id="teamBGlow"></div>
            <div class="foul-badge" id="teamBFoul" style="display: none;">⚠️ ФАЛЬСТАРТ</div>
        </div>
    </div>
    
    <button class="reset-btn" id="resetBtn">🔄 ОЧИСТИТЬ / НОВЫЙ ВОПРОС</button>
    
    <div class="qr-panel">
        <div class="qr-item"><strong>🔴 КОМАНДА A</strong><div id="qrcodeA"></div><div class="qr-link" id="linkA"></div><p>Сканируйте телефоном → кнопка</p></div>
        <div class="qr-item"><strong>🔵 КОМАНДА B</strong><div id="qrcodeB"></div><div class="qr-link" id="linkB"></div><p>Сканируйте телефоном → кнопка</p></div>
    </div>
    <footer style="margin-top: 30px; font-size: 12px; text-align: center; opacity: 0.7;">Нажмите СТАРТ → 60 секунд. Нажатие до старта = ФАЛЬСТАРТ!</footer>
</div>

<script>
    // ========== FIREBASE ==========
    const firebaseConfig = { databaseURL: "https://knopka-e92fb-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const buzzRef = database.ref('/buzzer');
    const gameStateRef = database.ref('/gameState');
    
    // ========== ТАЙМЕР ==========
    let timerInterval = null;
    let timeLeft = 60; // секунд
    let isTimerRunning = false;
    let gameLocked = false;  // true = кто-то уже нажал и ответил
    let foulA = false, foulB = false;
    let winner = null;
    
    const timerDisplay = document.getElementById('timerDisplay');
    const startTimerBtn = document.getElementById('startTimerBtn');
    const resetTimerBtn = document.getElementById('resetTimerBtn');
    
    function updateTimerDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        timerDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        if (timeLeft <= 0) timerDisplay.style.color = '#ff6666';
        else timerDisplay.style.color = '#0f0';
    }
    
    function stopTimer() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        isTimerRunning = false;
    }
    
    function startTimer() {
        if (timerInterval) stopTimer();
        if (timeLeft <= 0) { timeLeft = 60; updateTimerDisplay(); }
        isTimerRunning = true;
        timerInterval = setInterval(() => {
            if (isTimerRunning && timeLeft > 0) {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    stopTimer();
                    timerDisplay.textContent = "00:00";
                }
            }
        }, 1000);
    }
    
    function resetTimer() {
        stopTimer();
        timeLeft = 60;
        updateTimerDisplay();
        isTimerRunning = false;
    }
    
    startTimerBtn.addEventListener('click', () => {
        if (gameLocked) { alert('Раунд уже завершён! Нажмите «ОЧИСТИТЬ» для нового вопроса.'); return; }
        resetTimer();
        startTimer();
    });
    resetTimerBtn.addEventListener('click', () => { resetTimer(); });
    
    // ========== ИГРОВАЯ ЛОГИКА ==========
    const teamACard = document.getElementById('teamACard'), teamBCard = document.getElementById('teamBCard');
    const teamAStatus = document.getElementById('teamAStatus'), teamBStatus = document.getElementById('teamBStatus');
    const teamAGlow = document.getElementById('teamAGlow'), teamBGlow = document.getElementById('teamBGlow');
    const teamAFoul = document.getElementById('teamAFoul'), teamBFoul = document.getElementById('teamBFoul');
    const resetBtn = document.getElementById('resetBtn');
    
    function updateUI() {
        if (winner === 'A') {
            teamACard.classList.add('active'); teamBCard.classList.remove('active');
            teamAStatus.innerHTML = '🏆 ПОБЕДА! Нажали первыми!'; teamBStatus.innerHTML = '❌ Проигрыш';
            teamAGlow.innerHTML = '⚡ ПЕРВЫЙ НАЖАТИЕ! ⚡'; teamBGlow.innerHTML = '';
        } else if (winner === 'B') {
            teamBCard.classList.add('active'); teamACard.classList.remove('active');
            teamBStatus.innerHTML = '🏆 ПОБЕДА! Нажали первыми!'; teamAStatus.innerHTML = '❌ Проигрыш';
            teamBGlow.innerHTML = '⚡ ПЕРВЫЙ НАЖАТИЕ! ⚡'; teamAGlow.innerHTML = '';
        } else {
            teamACard.classList.remove('active'); teamBCard.classList.remove('active');
            teamAStatus.innerHTML = '⏳ Ожидание нажатия'; teamBStatus.innerHTML = '⏳ Ожидание нажатия';
            teamAGlow.innerHTML = ''; teamBGlow.innerHTML = '';
        }
        teamAFoul.style.display = foulA ? 'block' : 'none';
        teamBFoul.style.display = foulB ? 'block' : 'none';
    }
    
    function resetGame() {
        gameLocked = false;
        winner = null;
        foulA = false; foulB = false;
        resetTimer();
        buzzRef.set({ winner: null, timestamp: null, foul: null });
        gameStateRef.set({ locked: false });
        updateUI();
    }
    
    // Слушаем нажатия с телефонов
    buzzRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data || !data.winner || !data.timestamp) return;
        if (gameLocked) return; // уже кто-то ответил
        
        const now = Date.now();
        if (now - data.timestamp > 5000) return; // старый сигнал
        
        const team = data.winner;
        
        // ФАЛЬСТАРТ: если таймер не запущен ИЛИ таймер на 60 (не начали) ИЛИ игра не началась
        if (!isTimerRunning || timeLeft === 60) {
            if (team === 'A') foulA = true;
            else foulB = true;
            updateUI();
            buzzRef.set({ winner: null, timestamp: null, foul: team }); // сбрасываем, чтобы не блокировать
            return;
        }
        
        // Если уже есть фальстарт у этой команды — не даём отвечать
        if ((team === 'A' && foulA) || (team === 'B' && foulB)) {
            return;
        }
        
        // Нормальное нажатие
        if (!gameLocked) {
            gameLocked = true;
            winner = team;
            stopTimer(); // останавливаем таймер
            updateUI();
            gameStateRef.set({ locked: true, winner: team });
        }
    });
    
    resetBtn.addEventListener('click', resetGame);
    
    // ========== QR-коды ==========
    const baseUrl = window.location.href.split('?')[0].split('#')[0];
    const cleanBase = baseUrl.endsWith('index.html') ? baseUrl.replace('index.html', '') : baseUrl;
    const teamAUrl = `${cleanBase}?team=A`, teamBUrl = `${cleanBase}?team=B`;
    document.getElementById('linkA').innerText = teamAUrl;
    document.getElementById('linkB').innerText = teamBUrl;
    new QRCode(document.getElementById("qrcodeA"), { text: teamAUrl, width: 160, height: 160, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H });
    new QRCode(document.getElementById("qrcodeB"), { text: teamBUrl, width: 160, height: 160, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H });
    
    // ========== ТЕЛЕФОННЫЙ РЕЖИМ ==========
    const urlParams = new URLSearchParams(window.location.search);
    const teamParam = urlParams.get('team');
    if (teamParam === 'A' || teamParam === 'B') {
        document.body.innerHTML = '';
        document.body.style.background = teamParam === 'A' ? '#3a0808' : '#07122e';
        document.body.style.margin = '0'; document.body.style.display = 'flex'; document.body.style.justifyContent = 'center';
        document.body.style.alignItems = 'center'; document.body.style.height = '100vh';
        const teamColor = teamParam === 'A' ? '#ff4444' : '#4488ff';
        const teamName = teamParam === 'A' ? '🔴 КОМАНДА А' : '🔵 КОМАНДА B';
        const container = document.createElement('div');
        container.style.textAlign = 'center'; container.style.padding = '20px'; container.style.maxWidth = '400px'; container.style.width = '100%';
        const title = document.createElement('h1');
        title.innerText = teamName; title.style.color = teamColor; title.style.fontSize = '2.2rem'; title.style.marginBottom = '30px';
        const buzzBtn = document.createElement('button');
        buzzBtn.innerText = '🚨 НАЖАТЬ! 🚨'; buzzBtn.style.backgroundColor = teamColor; buzzBtn.style.border = 'none'; buzzBtn.style.color = 'white';
        buzzBtn.style.fontSize = '3rem'; buzzBtn.style.fontWeight = 'bold'; buzzBtn.style.padding = '40px 20px'; buzzBtn.style.borderRadius = '80px';
        buzzBtn.style.width = '100%'; buzzBtn.style.cursor = 'pointer'; buzzBtn.style.fontFamily = 'inherit';
        const statusMsg = document.createElement('p'); statusMsg.style.marginTop = '40px'; statusMsg.style.color = '#ddd'; statusMsg.style.fontSize = '1.1rem';
        statusMsg.innerText = 'Нажмите, когда ведущий скажет!';
        const loadingMsg = document.createElement('p'); loadingMsg.style.marginTop = '20px'; loadingMsg.style.fontSize = '0.9rem'; loadingMsg.style.color = '#ffaa66';
        loadingMsg.innerText = '🔄 Подключение...';
        container.appendChild(title); container.appendChild(buzzBtn); container.appendChild(statusMsg); container.appendChild(loadingMsg);
        document.body.appendChild(container);
        
        let canBuzz = true, localLock = false;
        let foulDetected = false;
        
        // Слушаем состояние игры (фальстарты)
        gameStateRef.on('value', (snap) => {
            const data = snap.val();
            if (data && data.locked && data.winner === teamParam) {
                loadingMsg.innerText = '🏆 ВЫ ОТВЕЧАЕТЕ!'; loadingMsg.style.color = '#ffdd77';
                buzzBtn.disabled = true; canBuzz = false;
            }
        });
        
        buzzRef.on('value', (snap) => {
            const data = snap.val();
            if (data && data.foul === teamParam) {
                foulDetected = true;
                loadingMsg.innerText = '⚠️ ФАЛЬСТАРТ! Ждите следующего вопроса.'; loadingMsg.style.color = '#ff8888';
                buzzBtn.disabled = true; canBuzz = false;
                statusMsg.innerText = 'Вы нажали до сигнала!';
            }
            else if (data && !data.winner && !data.foul) {
                canBuzz = true; localLock = false; foulDetected = false;
                loadingMsg.innerText = '✅ Готов к нажатию!'; loadingMsg.style.color = '#88ff88';
                buzzBtn.disabled = false; buzzBtn.style.opacity = '1';
                statusMsg.innerText = 'Нажмите, когда ведущий скажет!';
            } else if (data && data.winner && data.winner !== teamParam && !foulDetected) {
                loadingMsg.innerText = '❌ Соперник нажал быстрее...'; loadingMsg.style.color = '#ff8888';
                buzzBtn.disabled = true; canBuzz = false;
            }
        });
        
        async function sendBuzz() {
            if (!canBuzz || localLock || foulDetected) {
                statusMsg.innerText = '⛔ Нельзя нажимать сейчас!';
                setTimeout(() => { if (!foulDetected) statusMsg.innerText = 'Нажмите, когда ведущий скажет!'; }, 1500);
                return;
            }
            const snapshot = await buzzRef.once('value');
            const current = snapshot.val();
            if (current && (current.winner || current.foul)) {
                statusMsg.innerText = '⏳ Уже кто-то нажал!';
                setTimeout(() => statusMsg.innerText = 'Нажмите, когда ведущий скажет!', 1500);
                return;
            }
            localLock = true; canBuzz = false;
            buzzRef.set({ winner: teamParam, timestamp: Date.now() }).then(() => {
                statusMsg.innerText = '✅ Сигнал отправлен!';
                buzzBtn.disabled = true;
            }).catch(() => {
                statusMsg.innerText = '❌ Ошибка. Попробуйте ещё.';
                localLock = false; canBuzz = true; buzzBtn.disabled = false;
            });
        }
        buzzBtn.addEventListener('click', sendBuzz);
        buzzBtn.addEventListener('touchstart', () => { buzzBtn.style.transform = 'scale(0.96)'; });
        buzzBtn.addEventListener('touchend', () => { buzzBtn.style.transform = 'scale(1)'; });
        buzzRef.once('value').then((snap) => {
            const data = snap.val();
            if (data && data.winner === teamParam) { canBuzz = false; buzzBtn.disabled = true; loadingMsg.innerText = '🏆 ВЫ ПОБЕДИЛИ!'; }
            else if (data && data.foul === teamParam) { canBuzz = false; buzzBtn.disabled = true; loadingMsg.innerText = '⚠️ ФАЛЬСТАРТ!'; }
            else { loadingMsg.innerText = '🎤 Готов к бою!'; loadingMsg.style.color = '#aaffaa'; }
        });
    }
    if (!teamParam) resetGame();
</script>
</body>
</html>
